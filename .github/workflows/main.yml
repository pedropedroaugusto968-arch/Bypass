name: Build_SpaceXit_V4_Ghost

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Theos e ldid
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Baixa o ldid oficial para assinar a dylib
          curl -L https://github.com/theos/ldid/releases/latest/download/ldid_macos_x86_64 -o ~/theos/bin/ldid
          chmod +x ~/theos/bin/ldid
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Baixar SDK iOS
        run: |
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Compilar Dylib (Modo Stealth)
        run: |
          export THEOS=~/theos
          export PATH="$THEOS/bin:$PATH"
          # FINALPACKAGE=1 garante que o código seja limpo e anti-ban
          make package FINALPACKAGE=1
          
      - name: Upload da Dylib Pronta
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Bypass_Final
          path: packages/*.deb
