name: Build_SpaceXit_V4_Ghost

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Theos (Manual sem API)
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Baixar ldid Binário (Direto)
        run: |
          # Baixa o binário compilado direto do repositório de recursos do Procursus
          curl -L "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macosx_x86_64" -o ~/theos/bin/ldid
          chmod +x ~/theos/bin/ldid

      - name: Baixar SDK iOS (Git Clone Direto)
        run: |
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Compilar Dylib (Modo Stealth)
        run: |
          export THEOS=~/theos
          export PATH="$THEOS/bin:$PATH"
          # FINALPACKAGE=1 para máxima ocultação
          make package FINALPACKAGE=1
          
      - name: Upload da Dylib Pronta
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Bypass_Final
          path: packages/*.deb
