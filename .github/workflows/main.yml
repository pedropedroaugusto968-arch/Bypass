name: Build_SpaceXit_V4_Ghost

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Theos Manual (Sem Erro de API)
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Instalar SDK 14.5 (Manual)
        run: |
          curl -ksL https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o SDK.tar.xz
          mkdir -p ~/theos/sdks
          tar -xJf SDK.tar.xz -C ~/theos/sdks
          rm SDK.tar.xz

      - name: Compilar Dylib (Modo Stealth)
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload da Dylib Pronta
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Bypass_Final
          path: packages/*.deb
